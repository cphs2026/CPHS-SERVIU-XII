<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CPHS SERVIU XII Región</title>
</head>
<body>
<h1>CPHS SERVIU Magallanes</h1>
<button onclick="activarEdicion()">Modo edición</button>
<script>
const PIN_HASH = 'd2ee5cde084259b71b44afdf8ce4d4a6c66c99aa87b1a762d2a642826e2c674c';
async function sha256(t){
 const b=new TextEncoder().encode(t);
 const h=await crypto.subtle.digest('SHA-256',b);
 return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join('');
}
async function activarEdicion(){
 const pin=prompt('Ingrese PIN');
 if(!pin) return;
 const h=await sha256(pin);
 if(h===PIN_HASH) alert('Edición activada'); else alert('PIN incorrecto');
}
</script>
</body>
</html>
